spring:
  application:
    name: Rapidex

  datasource:
    url: jdbc:postgresql://localhost:5433/rapidexdb
    username: rapidex
    password: rapidex
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
