<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rapidex Suporte</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family: Arial, Helvetica, sans-serif; }
    body{ width:100%; height:100vh; background:#eef1f5; display:flex; align-items:center; justify-content:center; }
    .login-container{ width:420px; background:#fff; border-radius:24px; padding:45px; box-shadow:0 5px 20px rgba(0,0,0,0.05); }
    .logo{ display:flex; flex-direction:column; align-items:center; margin-bottom:35px; }
    .logo-icon{ width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#27c1d6,#2d5cff); display:flex; align-items:center; justify-content:center; color:white; font-size:28px; font-weight:bold; margin-bottom:15px; }
    .logo h1{ color:#11235a; font-size:36px; margin-bottom:8px; }
    .logo p{ color:#6d7a9a; text-align:center; font-size:15px; line-height:22px; }
    .form-group{ margin-top:24px; }
    .form-group label{ display:block; margin-bottom:10px; color:#11235a; font-weight:600; font-size:15px; }
    .form-group input{ width:100%; height:52px; border:1px solid #d9dfec; border-radius:12px; padding:0 16px; font-size:15px; outline:none; transition:0.2s; }
    .form-group input:focus{ border-color:#3d82ff; box-shadow:0 0 0 4px rgba(61,130,255,0.1); }
    .login-button{ width:100%; height:54px; border:none; border-radius:12px; background:linear-gradient(135deg,#3d82ff,#2f6fe4); color:white; font-size:17px; font-weight:bold; cursor:pointer; margin-top:30px; transition:0.2s; }
    .login-button:hover{ transform:translateY(-2px); opacity:0.95; }
    .error-msg{ margin-top:16px; padding:12px 16px; background:#FEF2F2; color:#DC2626; border-radius:10px; font-size:14px; text-align:center; }
    .support-info{ margin-top:30px; padding-top:22px; border-top:1px solid #e8ecf5; text-align:center; }
    .support-info h3{ color:#11235a; margin-bottom:8px; font-size:16px; }
    .support-info p{ color:#7c87a4; font-size:14px; line-height:22px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">R</div>
      <h1>Rapidex</h1>
      <p>Portal interno da equipe de suporte técnico</p>
    </div>

    <form th:action="@{/suporte/login}" method="post">
      <div class="form-group">
        <label for="username">E-mail corporativo</label>
        <input id="username" type="email" name="username" placeholder="Digite seu e-mail" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" name="password" placeholder="Digite sua senha" required />
      </div>

      <div class="error-msg" th:if="${param.erro}">
        E-mail ou senha incorretos.
      </div>

      <button type="submit" class="login-button">Entrar no painel</button>
    </form>

    <div class="support-info">
      <h3>Central de Atendimento Rapidex</h3>
      <p>Acesso exclusivo para analistas e administradores do suporte.</p>
    </div>
  </div>
</body>
</html>
